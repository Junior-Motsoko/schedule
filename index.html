<!DOCTYPE html>

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>Master Schedule</title>
<link rel="manifest" href="./manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ── iOS SYSTEM FONT STACK ── */
:root{
  --sys-font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;

  /* Dark (iOS Dark Mode) */
  --bg:#000000;
  --bg2:#1c1c1e;
  --bg3:#2c2c2e;
  --sur:#1c1c1e;
  --sur2:#2c2c2e;
  --sur3:#3a3a3c;
  --sur-glass:rgba(28,28,30,0.85);
  --bdr:rgba(255,255,255,0.08);
  --bdr2:rgba(255,255,255,0.12);
  --txt:#ffffff;
  --txt2:rgba(255,255,255,0.55);
  --txt3:rgba(255,255,255,0.25);
  --sep:rgba(255,255,255,0.08);
  --acc:#30d158;
  --acc-dim:rgba(48,209,88,0.15);
  --blue:#0a84ff;
  --gold:#ffd60a;
  --red:#ff453a;
  --ora:#ff9f0a;
  --purple:#bf5af2;
  --nav-h:83px;
  --safe-b:env(safe-area-inset-bottom,34px);
  --safe-t:env(safe-area-inset-top,44px);
  --r-xs:8px;--r-sm:12px;--r-md:16px;--r-lg:20px;--r-xl:24px;
}
[data-theme=light]{
  --bg:#f2f2f7;
  --bg2:#ffffff;
  --bg3:#f2f2f7;
  --sur:#ffffff;
  --sur2:#f2f2f7;
  --sur3:#e5e5ea;
  --sur-glass:rgba(255,255,255,0.85);
  --bdr:rgba(0,0,0,0.08);
  --bdr2:rgba(0,0,0,0.12);
  --txt:#000000;
  --txt2:rgba(0,0,0,0.5);
  --txt3:rgba(0,0,0,0.25);
  --sep:rgba(0,0,0,0.08);
  --acc:#34c759;
  --acc-dim:rgba(52,199,89,0.12);
  --blue:#007aff;
  --gold:#ff9500;
  --red:#ff3b30;
  --ora:#ff9500;
  --purple:#af52de;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{
  font-family:var(--sys-font);
  background:var(--bg);
  color:var(--txt);
  min-height:100%;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background 0.4s cubic-bezier(0.4,0,0.2,1), color 0.4s cubic-bezier(0.4,0,0.2,1);
}
button,input,textarea{font-family:inherit;-webkit-tap-highlight-color:transparent;outline:none;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{display:none;}

/* ── LAYOUT ── */
#root{
  max-width:430px;
  margin:0 auto;
  padding:calc(var(--safe-t) + 12px) 16px calc(var(--nav-h) + 16px);
  min-height:100vh;
}
@media(min-width:500px){#root{max-width:680px;}}
@media(min-width:800px){#root{max-width:800px;padding-left:24px;padding-right:24px;}}

/* ── NAV BAR (iOS Tab Bar) ── */
#nav-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:var(--sur-glass);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-top:0.5px solid var(--sep);
  display:flex;
  padding-bottom:var(--safe-b);
  height:var(--nav-h);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:transparent;
  color:var(--txt3);font-size:10px;font-weight:500;
  cursor:pointer;padding:8px 4px 0;
  transition:color 0.2s,transform 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.nb.on{color:var(--acc);}
.nb:active{transform:scale(0.88);}
.nb .ni{font-size:24px;line-height:1;margin-bottom:2px;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.nb.on .ni{transform:scale(1.12);}
.nb-label{font-size:10px;font-weight:500;}

/* ── SKELETON ── */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel{
  border-radius:var(--r-sm);
  background:linear-gradient(90deg,var(--sur2) 25%,var(--sur3) 50%,var(--sur2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s ease infinite;
}

/* ── iOS CARDS ── */
.card{
  background:var(--sur);
  border-radius:var(--r-lg);
  margin-bottom:8px;
  overflow:hidden;
  /* iOS-style shadow */
  box-shadow:0 2px 12px rgba(0,0,0,0.15),0 0 0 0.5px var(--bdr);
  transition:background 0.4s,box-shadow 0.4s;
}
[data-theme=light] .card{box-shadow:0 2px 12px rgba(0,0,0,0.08),0 0 0 0.5px var(--bdr);}
.card-p{padding:16px;}
.card-p-sm{padding:12px 16px;}

/* ── iOS GROUPED LIST ── */
.list-card{background:var(--sur);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.15),0 0 0 0.5px var(--bdr);}
[data-theme=light] .list-card{box-shadow:0 2px 12px rgba(0,0,0,0.08),0 0 0 0.5px var(--bdr);}
.list-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--sep);cursor:pointer;transition:background 0.15s;-webkit-tap-highlight-color:transparent;}
.list-row:last-child{border-bottom:none;}
.list-row:active{background:var(--sur2);}

/* ── iOS SECTION HEADER ── */
.ios-section{font-size:13px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:0.04em;padding:0 4px;margin:20px 0 6px;}

/* ── PROGRESS RING ── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.ring-label{position:absolute;text-align:center;}

/* ── iOS SEGMENTED CONTROL ── */
.seg-ctrl{
  display:flex;background:var(--sur2);border-radius:var(--r-sm);padding:2px;
  gap:0;overflow-x:auto;
}
.seg-ctrl::-webkit-scrollbar{display:none;}
.seg-btn{
  flex:1;min-width:52px;padding:6px 12px;border:none;background:transparent;
  font-family:var(--sys-font);font-size:13px;font-weight:500;color:var(--txt2);
  border-radius:calc(var(--r-sm) - 2px);cursor:pointer;white-space:nowrap;
  transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
  -webkit-tap-highlight-color:transparent;
}
.seg-btn.on{
  background:var(--sur);color:var(--txt);font-weight:600;
  box-shadow:0 1px 4px rgba(0,0,0,0.2),0 0 0 0.5px rgba(0,0,0,0.05);
}
[data-theme=light] .seg-btn.on{box-shadow:0 1px 4px rgba(0,0,0,0.1),0 0 0 0.5px rgba(0,0,0,0.04);}

/* ── iOS TOGGLE SWITCH ── */
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.ios-toggle{position:relative;width:51px;height:31px;cursor:pointer;flex-shrink:0;}
.ios-toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{
  position:absolute;inset:0;border-radius:15.5px;
  background:var(--sur3);transition:background 0.3s cubic-bezier(0.4,0,0.2,1);
}
.ios-toggle input:checked+.toggle-track{background:var(--acc);}
.toggle-thumb{
  position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;
  background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.3),0 0 0 0.5px rgba(0,0,0,0.08);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.ios-toggle input:checked~.toggle-thumb{transform:translateX(20px);}

/* ── PROGRESS BAR ── */
.pbar{height:4px;border-radius:99px;background:var(--sur3);overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}

/* ── TIMELINE ── */
.tl-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:13px 16px;border-bottom:0.5px solid var(--sep);
  cursor:pointer;transition:background 0.12s;
  -webkit-tap-highlight-color:transparent;position:relative;
}
.tl-row:last-child{border-bottom:none;}
.tl-row:active{background:var(--sur2);}
.tl-time{font-family:var(--mono);font-size:11px;color:var(--txt3);min-width:42px;padding-top:2px;flex-shrink:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.tl-body{flex:1;min-width:0;}
.tl-name{font-size:15px;font-weight:500;transition:all 0.2s;}
.tl-sub{font-size:13px;color:var(--txt2);margin-top:1px;}
.tl-done .tl-name{text-decoration:line-through;color:var(--txt3);}
.tl-done .tl-dot{background:transparent!important;border-color:var(--txt3)!important;opacity:0.3;}
.tl-check{font-size:20px;flex-shrink:0;padding-top:0;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}

/* ── TICK ANIMATION ── */
@keyframes tickPop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
.tick-anim{animation:tickPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}

/* ── CHECKLIST ITEM ── */
.ci{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:0.5px solid var(--sep);
  cursor:pointer;transition:background 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.ci:last-child{border-bottom:none;}
.ci:active{background:var(--sur2);}
.ci.done{opacity:0.4;}
.ci.done .ci-lbl{text-decoration:line-through;}
.ci-check{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;border:2px solid var(--sur3);transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.ci-check.on{border:none;transform:scale(1.1);}
.ci-lbl{font-size:15px;font-weight:400;flex:1;}
.ci-num{font-family:var(--mono);font-size:11px;color:var(--txt3);flex-shrink:0;}

/* ── COUNTDOWN ── */
.cd-num{font-family:var(--mono);font-size:48px;font-weight:700;line-height:1;letter-spacing:-0.03em;}

/* ── SCHEDULE TABLE ── */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r-lg);box-shadow:0 4px 24px rgba(0,0,0,0.25),0 0 0 0.5px var(--bdr);}
[data-theme=light] .tbl-scroll{box-shadow:0 4px 24px rgba(0,0,0,0.1),0 0 0 0.5px var(--bdr);}
.stbl{width:100%;border-collapse:collapse;min-width:540px;background:var(--sur);}
.stbl th{
  padding:12px 6px;font-size:12px;font-weight:800;text-align:center;
  color:var(--txt2);background:var(--sur);
  border-bottom:2px solid var(--bdr2);
  letter-spacing:0.06em;text-transform:uppercase;
  position:sticky;top:0;z-index:2;
}
.stbl th:first-child{text-align:left;padding-left:14px;position:sticky;left:0;z-index:3;background:var(--sur);}
.stbl td{padding:3px;text-align:center;vertical-align:middle;min-width:72px;border-bottom:1px solid var(--bdr);}
.stbl td:first-child{position:sticky;left:0;background:var(--bg2);z-index:1;padding-left:10px;text-align:left;min-width:52px;}
.stbl tr:last-child td{border-bottom:none;}
.stbl tr:hover td:not(:first-child){background:var(--sur2);}
.sec-hdr td{
  padding:9px 14px!important;font-size:11px;font-weight:800;
  color:var(--acc);background:var(--bg2)!important;
  border-bottom:1px solid var(--bdr2)!important;
  border-top:2px solid var(--bdr2)!important;
  cursor:pointer;user-select:none;letter-spacing:0.1em;text-transform:uppercase;
  position:sticky;left:0;
}
.scel{
  margin:3px;padding:7px 5px;border-radius:var(--r-xs);
  cursor:pointer;transition:transform 0.12s,opacity 0.12s;
  border-left:4px solid;
}
.scel:active{transform:scale(0.93);opacity:0.7;}
.scel-lbl{font-size:10px;font-weight:700;line-height:1.35;}

/* ── STAR BODY ── */
.star-body{padding:12px 16px;background:var(--sur2);font-size:13px;color:var(--txt2);line-height:1.6;border-top:0.5px solid var(--sep);}
textarea{
  width:100%;background:var(--sur2);color:var(--txt);
  border:none;border-radius:var(--r-sm);padding:10px 12px;
  font-size:14px;line-height:1.5;resize:vertical;min-height:100px;margin-top:8px;
  -webkit-appearance:none;
}
textarea:focus{outline:2px solid var(--acc);outline-offset:2px;}

/* ── PILL ── */
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-weight:600;font-size:15px;border-radius:var(--r-sm);padding:10px 20px;border:none;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--acc);color:#fff;}
.btn-ghost{background:var(--sur2);color:var(--txt);}
.btn-sm{font-size:13px;padding:7px 14px;border-radius:var(--r-xs);}
.btn-xs{font-size:12px;padding:5px 11px;border-radius:var(--r-xs);}
.btn-danger{background:rgba(255,69,58,0.12);color:var(--red);}

/* ── HERO CARD ── */
.hero{
  background:linear-gradient(145deg,var(--acc3,#0a5c2c),var(--bg2));
  border-radius:var(--r-xl);padding:24px;margin-bottom:12px;
  position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
[data-theme=light] .hero{box-shadow:0 4px 24px rgba(0,0,0,0.1);}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:var(--acc);opacity:0.07;border-radius:50%;}

/* ── CHIP ROW ── */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.chip{display:flex;flex-direction:column;align-items:center;background:var(--sur);border-radius:var(--r-md);padding:12px 16px;min-width:66px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,0.12),0 0 0 0.5px var(--bdr);}
[data-theme=light] .chip{box-shadow:0 1px 6px rgba(0,0,0,0.06),0 0 0 0.5px var(--bdr);}
.chip-n{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;}
.chip-l{font-size:9px;font-weight:600;letter-spacing:0.06em;color:var(--txt2);margin-top:3px;text-transform:uppercase;}

/* ── FADE ANIMATION ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.28s cubic-bezier(0.4,0,0.2,1) both;}

/* ── FILTER STRIP ── */
.filter-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fbtn{font-size:13px;font-weight:500;padding:6px 16px;border-radius:99px;border:none;background:var(--sur2);color:var(--txt2);cursor:pointer;transition:all 0.18s;-webkit-tap-highlight-color:transparent;}
.fbtn:active{transform:scale(0.94);}
.fbtn.on{background:var(--acc);color:#fff;}

/* ── MOD CARD ── */
.mcard{padding:14px 16px;border-bottom:0.5px solid var(--sep);display:flex;flex-direction:column;gap:6px;}
.mcard:last-child{border-bottom:none;}

/* ── THEME TRANSITION ── */
*{transition:background-color 0.35s cubic-bezier(0.4,0,0.2,1),border-color 0.35s,box-shadow 0.35s;}
.tl-dot,.tl-check,.pbar-fill,.ci-check{transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)!important;}

/* ── PRINT ── */
@media print{#nav-bar,.np{display:none!important}#root{padding-bottom:0}}
</style>
</head>
